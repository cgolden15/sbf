<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Internal Tools</title>
  <link rel="icon" href="logo.png" type="image/png"/>
  <link rel="stylesheet" href="styles.css">

  <!-- JavaScript for dynamically updating the footer year -->
  <script defer src="scripts.js"></script>
</head>
<body>

  <header>
    <div class="branding">
      <img src="logo.png" alt="Company Logo" class="logo">
      <h1>Internal Tools</h1>
    </div>
  </header>

  <main>
    <div class="card fade-in">
      <h2>Drawer Counter</h2>
      <p>Quickly calculate drawer balances and cash breakdowns.</p>
      <a href="https://sbf.goldenn.dev/count/"><button>Open</button></a>
    </div>
    <div class="card fade-in">
      <h2>Server Monitor</h2>
      <p>Monitor system uptime across environments.</p>
      <a href="https://stats.uptimerobot.com/SKZ4ypbRIr"><button>Open</button></a>
    </div>
    <div class="card fade-in">
      <h2>Tool Manager</h2>
      <p>Manage and configure access to internal tools.</p>
      <a href="/tool-manager"><button>Open</button></a>
    </div>
  </main>

  <footer>
    © <span id="current-year"></span> Cameron Golden
  </footer>

</body>
</html>
